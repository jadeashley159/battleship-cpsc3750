<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battleship</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #01060b;
  --panel: #071722;
  --grid-bg: #031521;

  --line: #2fd4ff;
  --accent: #00c8f0;

  --hit: #ff3b3b;
  --miss: #6ec1e4;
  --ship: #00ff9c;

  --text: #d9f3ff;
  --dim: #6fa3c2;
}

/* ───── BASE ───── */
body {
  margin: 0;
  font-family: 'Rajdhani', sans-serif;
  background: radial-gradient(circle at top, #02111a, #000 80%);
  color: var(--text);
}

/* HEADER */
header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--line);
  font-family: 'Orbitron';
  letter-spacing: 3px;
  color: var(--accent);
}

/* BUTTON */
button {
  background: var(--accent);
  border: none;
  padding: 10px 16px;
  font-family: 'Orbitron';
  cursor: pointer;
}

/* ───── GRID ───── */
.grid table {
  border-collapse: collapse;
}

.grid td {
  width: 36px;
  height: 36px;
  background: var(--grid-bg);
  border: 1px solid rgba(47,212,255,0.4);
  text-align: center;
  vertical-align: middle;
  transition: 0.15s;
}

/* hover */
.fireable:hover {
  background: rgba(255,60,60,0.3);
  cursor: crosshair;
}

/* STATES */
.ship {
  background: rgba(0,255,156,0.35);
}

.hit {
  background: var(--hit);
  color: white;
  font-weight: bold;
}

.miss {
  background: rgba(110,193,228,0.3);
  color: var(--miss);
}

/* labels */
th {
  color: var(--dim);
  font-size: 11px;
  padding: 2px;
}

/* panels */
.panel {
  background: var(--panel);
  padding: 15px;
  margin: 10px;
  border: 1px solid var(--line);
}

/* layout */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.board {
  flex: 1;
}

/* messages */
.msg {
  margin-top: 10px;
  font-size: 13px;
}

</style>

</head>

<body>

<header>BATTLESHIP</header>

<div class="container">

  <div class="board panel">
    <h3>Your Grid</h3>
    <div id="my-grid" class="grid"></div>
  </div>

  <div class="board panel">
    <h3>Enemy Grid</h3>
    <div id="enemy-grid" class="grid"></div>
  </div>

</div>

<script>
const SERVER = "http://127.0.0.1:5000";

let playerId = null;
let gameId = null;
let size = 10;

/* ───── GRID RENDER ───── */
function renderGrid(id, board, clickable=false) {
  const container = document.getElementById(id);
  container.innerHTML = "";

  const table = document.createElement("table");

  // header
  const header = document.createElement("tr");
  header.appendChild(document.createElement("th"));

  for (let c = 0; c < size; c++) {
    const th = document.createElement("th");
    th.textContent = String.fromCharCode(65 + c);
    header.appendChild(th);
  }
  table.appendChild(header);

  for (let r = 0; r < size; r++) {
    const tr = document.createElement("tr");

    const rowLabel = document.createElement("th");
    rowLabel.textContent = r + 1;
    tr.appendChild(rowLabel);

    for (let c = 0; c < size; c++) {
      const td = document.createElement("td");

      const val = board[r][c];
      if (val === "ship") td.classList.add("ship");
      if (val === "hit") td.classList.add("hit"), td.textContent = "X";
      if (val === "miss") td.classList.add("miss"), td.textContent = "•";

      if (clickable && val === "empty") {
        td.classList.add("fireable");
        td.onclick = () => fire(r, c);
      }

      tr.appendChild(td);
    }

    table.appendChild(tr);
  }

  container.appendChild(table);
}

/* ───── DEMO BOARD (so you SEE the UI working) ───── */
function demoBoard() {
  const b = Array.from({length:size}, () => Array(size).fill("empty"));

  b[2][3] = "ship";
  b[4][5] = "hit";
  b[6][2] = "miss";

  renderGrid("my-grid", b);
  renderGrid("enemy-grid", b, true);
}

demoBoard();

/* ───── FIRE ───── */
async function fire(r,c) {
  alert("Firing at " + r + "," + c);
}
</script>

</body>
</html>
